<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    background: #f5f7fb;
}

/* Sidebar */
.sidebar {
    width: 240px;
    background: #0f172a;
    color: white;
    height: 100vh;
    position: fixed;
    transition: 0.3s;
}

.sidebar.collapsed {
    width: 70px;
}

.sidebar a {
    display: flex;
    align-items: center;
    padding: 12px;
    margin-bottom: 5px;
    border-radius: 8px;
    transition: 0.2s;
    color: white;
    text-decoration: none;
}

.sidebar a:hover {
    background: #1e293b;
}

.sidebar i {
    width: 30px;
    text-align: center;
}

/* Hide text when collapsed */
.sidebar.collapsed span {
    display: none;
}

/* Main */
.main {
    margin-left: 240px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: 0.3s;
}

.main.expanded {
    margin-left: 70px;
}

/* Content grows */
.content {
    flex: 1;
}

/* Footer */
.footer {
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 10px;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar p-3">

    <h4 class="mb-4">⚡ LMS</h4>

    <a href="/"><i class="fa fa-home"></i> <span>Dashboard</span></a>
    <a href="/"><i class="fa fa-book"></i> <span>Courses</span></a>
    <!-- <a href="#"><i class="fa fa-users"></i> <span>Users</span></a> -->
    <a href="/profile/"><i class="fa fa-user"></i> <span>Profile</span></a>
    <a href="/accounts/logout/"><i class="fa fa-sign-out"></i> <span>Logout</span></a>

</div>

<!-- MAIN -->
<div id="main" class="main">

    <!-- NAVBAR -->
    <nav class="bg-white shadow p-3 d-flex justify-content-between align-items-center">

        <button onclick="toggleSidebar()" class="btn btn-light">
            <i class="fa fa-bars"></i>
        </button>

        <span class="me-3">{{ user.username }}</span>

    </nav>

    <!-- CONTENT -->
    <div class="p-4 content">
        {% block content %}{% endblock %}
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <small>© 2026 EduLearn LMS</small><br>
        <!-- <small class="text-gray-400">Built with Django • Bootstrap • Tailwind 🚀</small> -->
    </div>

</div>

<script>
function toggleSidebar(){
    let sidebar = document.getElementById("sidebar");
    let main = document.getElementById("main");

    sidebar.classList.toggle("collapsed");
    main.classList.toggle("expanded");
}
</script>

</body>
</html>
