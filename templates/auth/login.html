<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
}

/* Glass effect */
.glass {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.2);
}

/* Button animation */
.btn-animate {
    transition: 0.3s;
}
.btn-animate:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

/* Loader */
.loader {
    display: none;
}
</style>

</head>

<body>

<div class="min-h-screen flex items-center justify-center">

    <div class="glass p-8 w-full max-w-md text-white shadow-lg">

        <h2 class="text-center text-3xl font-bold mb-4">Login</h2>

        <form method="POST" onsubmit="showLoader()">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username"
                class="form-control mb-3">

            <input type="password" name="password" placeholder="Password"
                class="form-control mb-3">

            <button id="loginBtn" class="btn btn-light w-100 btn-animate">
                Login
            </button>

            <div id="loader" class="text-center mt-3 loader">
                ⏳ Logging in...
            </div>

        </form>

        <p class="text-center mt-4">
            No account?
            <a href="/accounts/register/" class="text-warning font-bold">Register</a>
        </p>

    </div>

</div>

<script>
function showLoader(){
    document.getElementById("loginBtn").style.display = "none";
    document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
