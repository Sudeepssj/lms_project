<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.glass {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.2);
}

.btn-animate {
    transition: 0.3s;
}
.btn-animate:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}
</style>

</head>

<body>

<div class="min-h-screen flex items-center justify-center">

    <div class="glass p-8 w-full max-w-md text-white shadow-lg">

        <h2 class="text-center text-3xl font-bold mb-4">Create Account</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username"
                class="form-control mb-3">

            <input type="email" name="email" placeholder="Email"
                class="form-control mb-3">

            <select name="role" class="form-control mb-3">
                <option value="student">Student</option>
                <option value="instructor">Instructor</option>
            </select>

            <input type="password" name="password1" placeholder="Password"
                class="form-control mb-3">

            <input type="password" name="password2" placeholder="Confirm Password"
                class="form-control mb-3">

            <button class="btn btn-warning w-100 btn-animate">
                Register
            </button>

        </form>

        <p class="text-center mt-4">
            Already have account?
            <a href="/accounts/login/" class="text-dark font-bold">Login</a>
        </p>

    </div>

</div>

</body>
</html>
