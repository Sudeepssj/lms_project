{% extends 'base_student.html' %}

{% block content %}

<h2 class="mb-4 fw-bold">My Profile</h2>

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow border-0 p-4 text-center">

            <!-- Avatar -->
            <div class="mb-3">
                <i class="fa fa-user-circle fa-4x text-primary"></i>
            </div>

            <h4 class="fw-bold">{{ user.username }}</h4>
            <p class="text-muted">{{ user.email }}</p>

            <hr>

            <div class="text-start mt-3">
                <p><strong>Role:</strong> Student</p>
                <p><strong>Status:</strong> Active</p>
            </div>

            <a href="/accounts/logout/" class="btn btn-danger mt-3 w-100">
                Logout
            </a>

        </div>

    </div>

</div>

{% endblock %}
