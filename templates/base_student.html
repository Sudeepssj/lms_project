<!DOCTYPE html>
<html>
<head>
<title>Student</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    background: #f5f7fb;
}

/* Sidebar */
.sidebar {
    width: 240px;
    background: #1e3a8a;
    color: white;
    height: 100vh;
    position: fixed;
    transition: 0.3s;
}

.sidebar.collapsed {
    width: 70px;
}

.sidebar a {
    display: flex;
    align-items: center;
    padding: 12px;
    margin-bottom: 5px;
    border-radius: 8px;
    color: white;
    text-decoration: none;
}

.sidebar a:hover {
    background: #1e40af;
}

.sidebar i {
    width: 30px;
    text-align: center;
}

.sidebar.collapsed span {
    display: none;
}

/* Main */
.main {
    margin-left: 240px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: 0.3s;
}

.main.expanded {
    margin-left: 70px;
}

/* Navbar */
.navbar-custom {
    background: linear-gradient(90deg, #1e3a8a, #2563eb);
    color: white;
}

/* Content */
.content {
    flex: 1;
}

/* Footer */
.footer {
    background: #111827;
    color: #d1d5db;
}
.footer a {
    color: #d1d5db;
    text-decoration: none;
}
.footer a:hover {
    color: #60a5fa;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar p-3">

    <h4 class="mb-4">📚 Student</h4>

    <a href="/">
    <i class="fa fa-home"></i> <span>Dashboard</span>
    </a>

    <a href="/">
        <i class="fa fa-search"></i> <span>Explore Courses</span>
    </a>

    <a href="/" id="enrolled">
        <i class="fa fa-book"></i> <span>My Courses</span>
    </a>

    <a href="/courses/student/profile/">
        <i class="fa fa-user"></i> <span>Profile</span>
    </a>

    <a href="/accounts/logout/">
        <i class="fa fa-sign-out"></i> <span>Logout</span>
    </a>

</div>

<!-- MAIN -->
<div id="main" class="main">

    <!-- NAVBAR -->
    <nav class="navbar navbar-custom px-3 d-flex justify-content-between">

        <button onclick="toggleSidebar()" class="btn btn-light btn-sm">
            <i class="fa fa-bars"></i>
        </button>

        <span class="fw-semibold text-white">{{ user.username }}</span>

    </nav>

    <!-- CONTENT -->
    <div class="p-4 content">
        {% block content %}{% endblock %}
    </div>

    <!-- FOOTER -->
    <footer class="footer">

        <div class="container py-5">

            <div class="row">

                <div class="col-md-4">
                    <h5 class="fw-bold text-white">EduLearn LMS</h5>
                    <p>Learn new skills with our modern platform.</p>
                </div>

                <div class="col-md-4">
                    <h6 class="fw-bold text-white">Quick Links</h6>
                    <ul class="list-unstyled mt-3">
                        <li><a href="/">Dashboard</a></li>
                    </ul>
                </div>

                <div class="col-md-4">
                    <h6 class="fw-bold text-white">Contact</h6>
                    <p class="mt-3">support@edulearn.com</p>
                </div>

            </div>

            <hr style="border-color:#374151;">

            <div class="text-center">
                <small>© 2026 EduLearn LMS 🚀</small>
            </div>

        </div>

    </footer>

</div>

<script>
function toggleSidebar(){
    let sidebar = document.getElementById("sidebar");
    let main = document.getElementById("main");

    sidebar.classList.toggle("collapsed");
    main.classList.toggle("expanded");
}
</script>

</body>
</html>
